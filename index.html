<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA VEU DE SITGES - Inici</title>
    <link rel="stylesheet" href="style.css?v=70.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">
</head>

<body data-section="general">
    <header>
        <div class="header-content">
            <h1 onclick="window.location.href='index.html'" style="cursor:pointer">LA VEU DE SITGES</h1>
            <nav id="navbar">
                <ul>
                    <li><a href="index.html" class="active">Inici</a></li>
                    <li><a href="sitges-film-festival/">Sitges Film festival</a></li>
                    <li><a href="donde-comer-en-sitges/">Donde comer en Sitges</a></li>
                    <li><a href="#">Contacte</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="main-container">
        <div class="content-grid">
            <section class="main-column">
                <h2 class="section-title-label"
                    style="color: #800020; font-family: 'Playfair Display', serif; margin-bottom: 1.5rem; text-transform: uppercase; font-size: 1.2rem; border-bottom: 2px solid #800020; padding-bottom: 0.5rem;">
                    Inici</h2>
                <div class="video-container" style="margin-bottom: 2rem; position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;">
                    <iframe style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" src="https://www.youtube.com/embed/s4ycv5hkAPk" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                </div>
                <main id="feed">
                    <div id="loading-msg">Carregant la Veu de Sitges...</div>
                </main>
            </section>

            <aside class="sidebar-column">
                <div class="sidebar-header">
                    <h2>SITGES A X</h2>
                </div>
                <div id="twitter-feed" style="min-height:600px; background:white; overflow:hidden;">
                    <!-- Widget oficial de Twitter garantit -->
                    <a class="twitter-timeline" data-height="600" data-theme="light"
                        href="https://twitter.com/hashtag/sitges">#sitges Tweets</a>
                </div>
            </aside>
        </div>
    </div>

    <div id="sentinel"></div>

    <div id="ia-modal" class="modal-backdrop">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="modal-header">
                <span class="modal-badge">Original</span>
                <h2 id="modal-title-es"></h2>
            </div>
            <div class="modal-body">
                <p id="modal-desc-es"></p>
                <a id="modal-link" href="#" target="_blank" class="btn-full">Llegir notícia original</a>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-content">
            <p>&copy; 2026 <strong>LA VEU DE SITGES</strong>. El diari digital independent d'actualitat.</p>
            <p>La Blanca Subur, Catalunya.</p>
        </div>
    </footer>

    <script src="app.js?v=70.0"></script>
    <!-- Script de Twitter al final per assegurar que carrega -->
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
</body>

</html>
